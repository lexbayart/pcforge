function compat(b){
  const w=[];const{gpu,n,cpu,mb,ram,psu}=b;
  if(!gpu||!cpu||!mb)return w;
  if(cpu.socket!==mb.socket)w.push({t:"error",m:"⛔ СОКЕТ: CPU "+cpu.socket+" ≠ MB "+mb.socket});
  if(n>mb.slots)w.push({t:"error",m:"⛔ PCIe СЛОТЫ: нужно "+n+"×, доступно "+mb.slots});
  if(psu){const tdp=gpu.tdp*n+cpu.tdp;const req=Math.ceil(tdp*1.25);
    if(psu.w<tdp)w.push({t:"error",m:"⛔ МОЩНОСТЬ: PSU "+psu.w+"W < "+tdp+"W"});
    else if(psu.w<req)w.push({t:"warn",m:"⚠️ МОЩНОСТЬ: PSU "+psu.w+"W на пределе! Нужно "+req+"W"});}
  if(n>=2&&!gpu.nvlink)w.push({t:"warn",m:"⚠️ MULTI-GPU без NVLink: ~64 GB/s — bottleneck для 70B+ моделей."});
  if(ram&&mb){const a=mb.rtype.toLowerCase().replace(" ecc","");const b2=ram.type.toLowerCase().replace(" ecc","");
    if(a!==b2)w.push({t:"warn",m:"⚠️ RAM: плата — "+mb.rtype+", выбрана — "+ram.type});}
  if(gpu.cooling==="passive")w.push({t:"ok",m:"ℹ️ RTX PRO 6000 Max-Q — пассивное охлаждение. Нужен корпус с продувом."});
  if(w.filter(x=>x.t==="error").length===0)w.push({t:"ok",m:"✅ Совместимость OK — конфигурация рабочая!"});
  return w;
}
function calcStats(b){
  const{gpu,n}=b;if(!gpu)return null;
  const vram=gpu.vram*n;const tdp=gpu.tdp*n+(b.cpu?b.cpu.tdp:0);
  const nv=gpu.nvlink&&n>1;const bw=nv?gpu.nvbw*(n-1):(n>1?64:0);
  const isPro=gpu.id==="pro6000ws"||gpu.id==="pro6000mq";
  const ai=isPro?(nv?gpu.tops*n*0.95:gpu.tops):(n>1?gpu.tops*n*0.62:gpu.tops);
  const video=isPro?520*n:280*n;
  const cost=(gpu?gpu.price:0)*n+(b.cpu?b.cpu.price:0)+(b.mb?b.mb.price:0)+(b.ram?b.ram.price:0)+(b.psu?b.psu.price:0)+(b.stor?b.stor.price:0);
  return{ai:Math.min(ai,MAX.ai),video:Math.min(video,MAX.video),vram,tdp,thermal:Math.min(100,Math.round(tdp/3000*100)),bw,cost};
}

function fitBadge(need,gv,n){
  const tot=gv*n;
  if(need==null)return{cl:'fno',l:'N/A'};if(need<=gv)return{cl:'fok',l:'✅ ВЛЕЗЕТ'};
  if(need<=tot)return{cl:'fwarn',l:'⚠️ '+Math.ceil(need/gv)+'× GPU'};
  if(need<=gv*4)return{cl:'fneed',l:'🔀 '+Math.ceil(need/gv)+'× GPU'};
  return{cl:'fno',l:'❌ НЕ ВЛЕЗЕТ'};
}
